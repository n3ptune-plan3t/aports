name: Build Alpine package

on:
  workflow_dispatch:
    inputs:
      package:
        description: 'Package directory to build (e.g. noctalia, ephoto)'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Allow unprivileged user namespaces (Ubuntu 24.04 AppArmor restriction)
        run: sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0

      - name: Build package in Alpine edge container
        run: |
          docker run --rm --privileged \
            -e PKG="${{ github.event.inputs.package }}" \
            -v "${{ github.workspace }}:/repo" \
            -w /repo \
            alpine:edge sh /repo/build.sh

      - name: Upload built package
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ github.event.inputs.package }}
          path: out/
          if-no-files-found: error
